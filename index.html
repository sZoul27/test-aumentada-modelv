<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Modelo en Realidad Aumentada</title>

  <!-- Importar el componente model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

  <!-- Fuente moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #0d0d0d;
      color: #f0f0f0;
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 4rem 2rem;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    }

    header h1 {
      font-size: 3rem;
      color: #00ffe0;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.2rem;
      color: #ff00ff;
    }

    section {
      padding: 3rem 2rem;
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    h2 {
      color: #00ffe0;
      margin-bottom: 2rem;
    }

    model-viewer {
      width: 100%;
      height: 500px;
      border: 2px solid #00ffe0;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffe0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    model-viewer:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px #ff00ff;
    }

    footer {
      text-align: center;
      padding: 2rem;
      background: #0d0d0d;
      border-top: 1px solid #333;
    }

    footer a {
      margin: 0 1rem;
      color: #ff00ff;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #00ffe0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mi Experiencia en Realidad Aumentada</h1>
    <p>Un vistazo a mi modelo 3D</p>
  </header>

  <section>
    <h2>Modelo Destacado</h2>
    <model-viewer src="./recursos/kirby.glb" alt="Kirby"
      ar camera-controls shadow-intensity="1"
      environment-image="./recursos/glasshouse_interior_4k.hdr"
      poster="./recursos/poster.webp">
    </model-viewer>
    <p style="margin-top:1rem; color:#ccc;">
      Este modelo representa mi exploración artística en entornos aumentados.
    </p>
  </section>

  <footer>
    <p>Conéctate conmigo:</p>
    <a href="mailto:tuemail@example.com">Correo</a>
    <a href="https://linkedin.com/in/tuusuario">LinkedIn</a>
    <a href="https://instagram.com/tuusuario">Instagram</a>
    <a href="https://artstation.com/tuusuario">ArtStation</a>
  </footer>
</body>
</html>
